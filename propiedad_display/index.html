<html>
    <head>
        <title>
            
        </title>
        <style>
            .h1 {
                color: darkred;
                font-size: 30px;
                text-align: center;
            }
            .menu {
                display: inline;
                color: aliceblue;
                background-color: black;
                width: 1000px;
                height: 1000px;
            }
            .menu_block{
                display: block;
                color: rgb(255, 208, 0);
                background-color: rgb(146, 0, 0);
                width: 400px;
                height: 200px;
                border: 1px solid black;
            }
        </style>
    </head>
    <body>
        <h1 class="h1">Elementos inline</h1>
        <div class="menu">Productos</div>
        <div class="menu">Servicios</div>
        <div class="menu">Contacto</div>
        <hr/>
        <h1 class="h1">Elementos block</h1>
        <div class="menu_block">Productos</div>
        <div class="menu_block">Servicios</div>
        <div class="menu_block">Contacto</div>
    </body>
</html>
