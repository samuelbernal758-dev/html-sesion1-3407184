<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Perfil</title>
    <style>
        @font-face {
            font-family: 'Inter';
            src: url("inter/Inter-Italic.ttf") format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Inter';
            src: url("inter/Inter-Italic.ttf") format('truetype');
            font-weight: 700;
            font-style: bold;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #6a4caf;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .Card_1 {
            background-color: #f7941d;
            width: 320px;
            border-radius: 25px;
            overflow: hidden;
            padding: 12px 12px 0 12px;
        }

        .foto {
            width: 100%;
            height: 230px;
            object-fit: cover;
            border-radius: 15px 15px 0 0;
            display: block;
        }

        .card_2 {
            background-color: #404040;
            margin-left: -12px;
            margin-right: -12px;
            padding: 30px 20px 40px 20px;
            text-align: center;
            border-radius: 25px 25px 0 0;
            margin-top: -20px;
            position: relative;
        }

        .nombre {
            color: #fce8b2;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .Card_texto {
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .boton {
            background-color: #f7941d;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

    <div class="Card_1">
        <img src="retrato.png" alt="Samuel Bravo" class="foto">
        
        <div class="card_2">
            <div class="nombre">Samuel Bravo</div>
            <p class="Card_texto">
                Software engineer with a knack for problem-solving, I thrive on coding challenges and crafting elegant solutions.
            </p>
            <button class="boton">Follow</button>
        </div>
    </div>

</body>
</html>
