<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Reseteo de estilos
        por defecto*/

        *{
            margin: 0;
            padding: 0;
        }

        body{
            background-color: lightgray;

        }

        .dad{
            display: block;
            margin: 100px;
            width: 500px;
            height: auto;
            background-color: Darkred;
            padding: 50px 30px 40px 20px;
            border-right: #b700ff dashed 10px;
            border-left: #0b0449 solid 7px;
            border-top: #ffc400 double 7px;
            border-bottom: #04f7ff outset 2px;   
        }

        .son{
            display: block;
            width: 200px;
            height: 200px;
            padding-top: 50px;
            padding-left: 50px;
            padding-bottom: 50px;
            padding-right: 50px;
            background-color: lightblue;
            border: black solid 5px;
        }

        .sonone{
            margin: 20px auto 50px auto;
        }
        .sontwo{
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="dad">
        <div class="son sonone">Im the son one</div>
        <div class="son sonone">Im the son two</div>
    </div>
</body>
</html>
