<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Importacion de fuentes */
        @font-face {
            font-family: 'Inter';
            src: url('inter/Inter.ttf') format ('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Inter';
            src: url('inter/Inter.ttf') format ('truetype');
            font-weight: 700;
            font-style: bold;
            font-display: swap;
        }

        /* reseteo de estilos */
        *{
            margin: 0;
            padding: 0;
        }

        /* body */
        body {
            background-color: lightgray;
            /* fuente */
            font-family: 'inter', sans-serif;
        }

        /* BEM: bBloque(contenedor
        Elemento
        Modificador)
        */

        .card{
            /* tamaño */
            width: 300px;
            height: auto;
            /* fondo */
            background-color: white;
            /* Centrado */
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 9px 14px 16px 4px rgba(0,0,0,0.1);
            border-radius: 15px;

        }

        .card__empresa{
            width: auto;
            height: 100px;
            background-color: #3E3E40;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            /*texto*/
            color:white;
            font-size: 20px;
            font-weight:bold;
            text-align: center;
            padding-top: 50px;
        
        }

        .card__flag{
            background-color: #76C4C4;
            height: 60px;

        }

        .card__gato{
            width: 150px;
            height: 150px;
            display: block;
            /*distorcion*/
            object-fit: cover;
            /*posicionamiento*/
            margin-left: auto;
            margin-right: auto;
            margin-top: -100px;
            /*borde*/
            border-radius: 50%;
            border: white solid 5px;
        }

        .card__nombre{
            text-align: center;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            font-size: 20px;
            /* Espaciar las letras*/
            letter-spacing: 3px;
        }

        .card__nombre--negrita{
            font-weight: bold;
        }

        .card__profesion{
            color: rgb(48, 196, 147);
            text-align: center;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
            font-size: 20px;
            /*Espaciar las letras*/
            letter-spacing: 2px;
        }

        .card__tabla{
            font-size: 12px;
            width: 200px; 
            /*Centrado*/
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
        }

        .card__tabla--atributo{
            font-weight: bold;
            color: #76C4C4;
        }

    </style>
</head>
<body>
    <!-- contenedor -->
    <div class="card">
        <!-- empresa -->
        <div class="card__empresa">
            SENA CGMLTI
        </div>
        <!-- FLAG(turquesa) -->
        <div class="card__flag"></div>
        <!-- retrato -->
        <img class="card__gato" 
             src="gato.avif"
             alt="gato">
             <!-- nombre -->
        <div class="card__nombre">Wilson
                                 <span class="card__nombre--negrita">   
                                    Manyoma 
                                </span>
        </div>
        <!-- profesion -->
        <div class="card__profesion">web desing & developer</div>
        <table class="card__tabla">
            <tr>
                <td class="card__tabla--atributo">ID</td>
                <td>1234</td>
            </tr>
            <tr>
                <td class="card__tabla--atributo">Documento</td>
                <td>324423432</td>
            </tr>
            <tr>
                <td class="card__tabla--atributo">Correo</td>
                <td>wilson.manyoma@gmail.com</td>
            </tr>   
        </table>
    </div>
</body>
</html>
